#### srsUE 5G - UE1 (slice SST=1, SD=0x000001)
[rf]
device_name = zmq
# Talks to broker: UE1 tx=2101 (broker pulls UL), rx=2100 (broker pushes DL)
device_args = tx_port=tcp://127.0.0.1:2101,rx_port=tcp://127.0.0.1:2100,base_srate=23.04e6
srate = 23.04e6
freq_offset = 0
tx_gain = 50
rx_gain = 40
nof_antennas = 1

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106

[pcap]
enable = none
mac_filename = /tmp/ue1_mac.pcap
mac_nr_filename = /tmp/ue1_mac_nr.pcap
nas_filename = /tmp/ue1_nas.pcap

[log]
all_level = warning
phy_lib_level = none
all_hex_limit = 32
filename = /tmp/ue1.log
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc = 63BFA50EE6523365FF14C1F45F88737D
k = 00112233445566778899aabbccddeeff
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet
apn_protocol = ipv4

[slicing]
enable = true
nssai-sst = 1
nssai-sd = 1

[gw]
netns = ue1
ip_devname = tun_srsue1
ip_netmask = 255.255.255.0

[gui]
enable = false
